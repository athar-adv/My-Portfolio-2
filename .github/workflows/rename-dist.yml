# .github/workflows/rename-dist.yml
name: Rename dist to docs

on:
  push:
    paths:
      - 'dist/**'

jobs:
  rename:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Rename dist to docs and add .nojekyll
        run: |
          rm -rf docs
          mv dist docs
          touch docs/.nojekyll

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ dist/
          git commit -m "chore: rename dist to docs [skip ci]"
          git push